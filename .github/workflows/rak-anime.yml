name: Rak Anime

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Decode YouTube credentials
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.TOKEN_RAK_ANIME_B64 }}" | base64 -d > token_rak_anime.json
      - name: Set channel for Rak Anime
        run: >-
          sed -i 's|channel:.*|channel: "rak_anime"|' config.yaml
      - name: Run hybrid pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -m src.pipeline_hybrid
      - name: Commit state.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "state.json unchanged"
          else
            git commit -m "auto: update state.json"
            git push
          fi

      - name: Post to blog-web
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          if [ ! -f state.json ]; then echo "state.json not found"; exit 0; fi
          if ! jq -e '.published | length > 0' state.json > /dev/null 2>&1; then echo "no published entries"; exit 0; fi
          BWD=/tmp/blog-web
          rm -rf $BWD
          git clone --depth=1 https://x-access-token:${GITHUB_PAT}@github.com/Deady456/blog-web.git $BWD
          jq -c '{video_id:(.published[-1].video_id//""), title:(.published[-1].title//""), topic:(.published[-1].topic//""), ts:(.published[-1].ts//""), channel:"rak_anime"}' state.json | python $BWD/add_post.py
          cd $BWD
          git add posts/
          if git diff --staged --quiet; then
            echo "blog-web: no changes"
          else
            git commit -m "auto: add post from rak_anime"
            git push
          fi

      - name: Commit refreshed token
        run: |
          if git diff --quiet token_rak_anime.json 2>/dev/null; then
            echo "Token unchanged"
          else
            git add token_rak_anime.json
            git commit -m "auto: refresh Rak Anime token"
            git push
          fi
