niche: "berita dan trend terkini anime & manga dunia (rilis anime baru, manga terbaru, adaptasi live-action, kolaborasi brand, rekor penjualan, pengumuman studio, berita voice actor, teknologi animasi, fenomena viral anime)"
audience: "penggemar anime Indonesia yang up-to-date dengan berita dan trend terbaru dunia anime & manga"
language: id

script:
  model: llama-3.3-70b-versatile
  target_seconds: 55
  words_per_second: 2.3

voice:
  provider: elevenlabs
  elevenlabs_model: eleven_multilingual_v2
  variety:
    enabled: true
    voices:
      - edge_id: "id-ID-ArdiNeural"
        elevenlabs_id: "21m00Tcm4TlvDq8ikWAM"
        name: "Ardi"
        gender: "male"
      - edge_id: "id-ID-JakaNeural"
        elevenlabs_id: "IKne3meq5aSn9XLyUdCD"
        name: "Jaka"
        gender: "male"
    strategy: "round_robin"
  voice: id-ID-ArdiNeural
  elevenlabs_voice_id: 21m00Tcm4TlvDq8ikWAM

captions:
  whisper_model: base
  font: "Anton"
  font_size: 90
  primary_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline: 6
  words_per_caption: 3
  position_y: 0.55

video:
  width: 1080
  height: 1920
  fps: 30

visuals:
  # Hybrid visual strategy: web scraping + AI generation
  source: hybrid  # "web", "ai", or "hybrid" (random mix)
  hybrid_mix: 0.5  # 50% web, 50% AI (0.0 = all AI, 1.0 = all web)

upload:
  privacy: "public"
  category_id: "27"
  made_for_kids: false
  channel: "animewebai"
  default_tags: ["fakta anime", "anime unik", "manga", "fakta manga", "anime facts", "rekomendasi anime", "anime Indonesia", "kultur Jepang", "anime viral", "fakta karakter"]



music:
  enabled: true
  source: "local"
  local_dir: "assets/music"
  volume: 0.03
  fade_in: 2.0
  fade_out: 3.0
  mood_mapping:
    list: "upbeat"
    story: "cinematic"
    comparison: "neutral"
    myth_busting: "suspense"
    neutral: "neutral"
branding:
  enabled: true
  intro:
    enabled: false
    path: "assets/branding/intro.mp4"
    duration: 2.5
  outro:
    enabled: false
    path: "assets/branding/outro.mp4"
    duration: 3.0
    cta_text: "Subscribe untuk fakta unik lainnya!"
  watermark:
    enabled: true
    path: "assets/branding/watermark.png"
    position: "center"
    opacity: 0.6
    size: 300
  comment_box:
    enabled: true
    position: "bottom"
    delay_seconds: 1.5
    font: "Anton"
    font_size: 26
    font_color: "black"
    box_color: "white@0.9"
    box_radius: 20
    margin: 40
    usernames:
      - "@fakta.unik.hari.ini"
      - "@sains.cepat"
      - "@ilmu.random"
      - "@facts.indo"
      - "@pengetahuan.umum"
      - "@daily.science.id"
      - "@sains.populer"
      - "@trivia.indonesia"
    comments:
      - "Keren banget! Ga nyangka gitu"
      - "Wajib tahu nih buat semua orang!"
      - "Fakta yang jarang diketahui orang"
      - "Ternyata begini ya, mantap!"
      - "Share ke temen yang belum tau!"
      - "Baru tau gw, ternyata begitu"
      - "Wah, ga sangka bisa begitu!"
      - "Beneran? Cekidot guys!"
      - "Info penting nih, jangan skip!"
      - "Setuju gak sama fakta ini?"

comments:
  model: llama-3.1-8b-instant
  poll_interval_minutes: 180
  auto_reply: true
  delete_spam: true
