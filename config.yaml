niche: "berita dan trend terkini anime & manga dunia (rilis anime baru, manga terbaru, adaptasi live-action, kolaborasi brand, rekor penjualan, pengumuman studio, berita voice actor, teknologi animasi, fenomena viral anime)"
audience: "penggemar anime Indonesia yang up-to-date dengan berita dan trend terbaru dunia anime & manga"
language: id

script:
  model: gemini-1.5-pro
  target_seconds: 55
  words_per_second: 2.3

content_variation:
  enabled: true
  formats: ["news_breakdown", "list", "story", "deep_dive"]
  min_format_switch: 3

voice:
  provider: elevenlabs
  elevenlabs_model: eleven_multilingual_v2
  variety:
    enabled: true
    voices:
      - edge_id: "id-ID-ArdiNeural"
        elevenlabs_id: "VR6AewLTigWG4xSOukaG"
        name: "Arnold"
        gender: "male"
      - edge_id: "id-ID-JakaNeural"
        elevenlabs_id: "ErXwobaYiN019PkySvjV"
        name: "Jaka"
        gender: "male"
    strategy: "round_robin"
  voice: id-ID-ArdiNeural
  elevenlabs_voice_id: VR6AewLTigWG4xSOukaG

captions:
  whisper_model: base
  font: "Anton"
  font_size: 65
  primary_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline: 6
  words_per_caption: 3
  position_y: 0.55

video:
  width: 1080
  height: 1920
  fps: 30

visuals:
  # Hybrid visual strategy: web scraping + AI generation
  source: hybrid  # "web", "ai", or "hybrid" (random mix)
  hybrid_mix: 0.3  # 30% web, 70% AI (0.0 = all AI, 1.0 = all web)

upload:
  privacy: "public"
  category_id: "27"
  made_for_kids: false
  channel: "animewebai"
  default_tags: ["fakta anime", "anime unik", "manga", "fakta manga", "anime facts", "rekomendasi anime", "anime Indonesia", "kultur Jepang", "anime viral", "fakta karakter"]



branding:
  enabled: true
  intro:
    enabled: false
    path: "assets/branding/intro.mp4"
    duration: 2.5
  outro:
    enabled: false
    path: "assets/branding/outro.mp4"
    duration: 3.0
    cta_text: "Subscribe untuk fakta unik lainnya!"
  watermark:
    enabled: true
    path: "assets/branding/watermark.png"
    position: "center"
    opacity: 0.6
    size: 300
hook_text:
  enabled: true
  font: "Anton"
  font_size: 80
  color: "white"
  outline_color: "&H00000000"
  outline: 4
  position: "center"
  duration: 3
